services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./dayplanner-backend
      dockerfile: Dockerfile
      target: production
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://dayplanner:change-me@postgres:5432/dayplanner_db}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - ENABLE_BACKGROUND_SYNC=true
      - APP_ENV=production
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    restart: unless-stopped
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./dayplanner-frontend
      dockerfile: Dockerfile
      target: production
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${BACKEND_PUBLIC_URL:-http://localhost}
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=dayplanner_db
      - POSTGRES_USER=dayplanner
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-server --requirepass "$$REDIS_PASSWORD"; else redis-server; fi'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
